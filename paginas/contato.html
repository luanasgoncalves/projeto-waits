<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waits - Página de Contato</title>
    <link rel="shortcut icon" href="../assets/img/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.0/build/css/intlTelInput.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/contato.css"> 
</head>

<body>
     <header>
        <nav class="navbar">
             <a href="../"><img src="../assets/img/logo.svg" id="logo" alt="logo waits"><img src="../assets/img/logotipo.svg" id="logotipo" alt="logotipo waits"><h1>Projeto Waits - Página de Contato</h1></a>
            <ul class="navbar">
                <li><a href="./sensores.html" class="link">Sensores</a></li>
                <li><a href="./projeto.html" class="link">História do Projeto</a></li>
                <li><a href="./publicacoes.html" class="link">Publicações</a></li>
                <li><a href="./prototipos.html" class="link">Protótipos</a></li>
                <li><a href="./contato.html" class="link">Fale Conosco</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <figure class="foto">
            <img src="../assets/img/foto-contato.svg" alt="foto da ilha" title="foto da ilha">
        </figure>
        <form id="formulario">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" inputmode="numeric" placeholder="XX 99999-9999"  required>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>
          
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" placeholder="Insira aqui sua mensagem"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </main>
    <footer><p> &copy; 2026 - Desenvolvido por bolsistas do IFRS</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.0/build/js/intlTelInput.min.js"></script>
    <script src="../assets/js/contato.js"></script> 
</body>
</html>
