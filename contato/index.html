<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waits - Página de Contato</title>
    <link rel="stylesheet" href="../assets/css/style.css">    
</head>
<body>
    <header>
        <nav class="navbar">
            <h1><a href="../"><img src="https://ifrs.edu.br/wp-content/uploads/2022/08/Logo-IFRS-cores-sem-fundo-Horizontal.png" id="logo" alt="logo waits">Projeto Waits</a></h1>
            <ul class="navbar">
                <li><a href="../projeto" class="link">História do Projeto</a></li>
                <li><a href="../publicacoes" class="link">Publicações</a></li>
                <li><a href="../prototipos" class="link">Protótipos</a></li>
                <li><a href="../contato" class="link">Fale Conosco</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form action="index.html">
            <label for="Nome">Nome:</label>
            <input type="text" id="Nome" name="Nome" placeholder="Digite seu nome" required><br>
            <label for="Telefone">Telefone</label>
            <input type="Telefone" id="Telefone" name="Telefone" placeholder="Digite seu telefone" required><br>
            <label for="Email">Email</label>
            <input type="email" id="Email" name="email" placeholder="Digite seu e-mail" required><br>
            <label for="Mensagem">Mensagem</label>
            <input type="Mensagem:" id="Mensagem" name="Mensagem" placeholder="Insira aqui uma mensagem" required><br>
            <button type="submit">Enviar</button>
        </form>
    </main><hr>
    <footer><p> &copy; 2026 - Desenvolvido por bolsistas do IFRS</p></footer>
</body>
</html>
